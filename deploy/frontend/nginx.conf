server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # index.html 不缓存，确保每次加载最新版本
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA 相关文件不缓存，确保始终获取最新版本（必须放在通用 JS 规则之前，nginx 按顺序匹配）
    location ~* ^/(manifest\.json|sw\.js|sw-src\.js|registerSW\.js|workbox-.*\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # 图标文件：可缓存但允许重新验证（无 content hash，不能 immutable）
    # ^~ 优先级高于下面的 regex，确保匹配到这里
    location ^~ /icons/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    # beaver.svg / beaver.png / apple-touch-icon / maskable-icon 等根目录图标
    location ~* ^/(beaver\.(svg|png)|apple-touch-icon\.png|maskable-icon\.png|favicon\.ico|icon-preview\.png)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    # Cache static assets - Vite 构建的文件带有 hash，可以长期缓存
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
