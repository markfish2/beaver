services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beaver-backend
    restart: unless-stopped
    platform: linux/amd64
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/app.db
      - SECRET_KEY=${SECRET_KEY}
    networks:
      - beaver-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beaver-frontend
    restart: unless-stopped
    platform: linux/amd64
    depends_on:
      - backend
    networks:
      - beaver-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: beaver-nginx
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - beaver-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  beaver-network:
    driver: bridge
